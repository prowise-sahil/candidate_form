<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Prowise Advisory</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <img src="assets/logo.png" alt="Prowise Advisory">
                <span>Admin Panel</span>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Navigation</div>
                <a class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard
                </a>
                <a class="nav-item" data-view="applications" onclick="switchView('applications')">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Applications
                </a>
                <a class="nav-item" data-view="reports" onclick="switchView('reports')">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Reports
                </a>
                 <a class="nav-item" data-view="admins" onclick="switchView('admins')">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Admins
                </a>
                <a class="nav-item" data-view="settings" onclick="switchView('settings')">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Settings
                </a>
            </nav> 
                <div class="sidebar-footer">
                <div class="avatar">A</div>
                <div>
                    <p id="adminName">Admin User</p>
                    <small id="adminEmail">admin@prowise.com</small>
                </div>
            </div>
        </aside>
        
     <!-- Main -->
        <div class="main-area" id="mainArea">
            <div class="top-bar">
                <button class="btn-ghost" onclick="toggleSidebar()" style="border:none;cursor:pointer">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1>Prowise Advisory — Admin Panel</h1>
            </div>
            <div class="main-content" id="contentArea"></div>
        </div>
    </div>

    <!-- Detail Overlay -->
    <div class="detail-overlay" id="detailOverlay" onclick="closeDetailOnOverlay(event)">
        <div class="detail-panel" id="detailPanel"></div>
    </div>

    <div class="modal-overlay" id="adminModalOverlay" onclick="closeAdminModalOnOverlay(event)">
        <div class="modal-panel" id="adminModalPanel"></div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        async function checkAuth() {
            const res = await fetch("http://localhost:3000/me", {
                credentials:"include"
            });
            const data = await res.json();
            console.log(data)
            if(!data.user){
                window.location.href = 'admin_login.html';
            }
            document.querySelector("#adminEmail").innerHTML=data.user.email
        }
        checkAuth();
    </script>
</body>
</html>
